backend:
  name: git-gateway
  branch: main
  repo: sergiosveve-ctrl/blog-sport-togo # Ton identifiant GitHub corrigé

media_folder: "img"
public_folder: "/img"

collections:
  - name: "blog"
    label: "Articles de Sport"
    folder: "blog" # Les articles seront créés dans ce dossier
    create: true
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Contenu de l'article", name: "body", widget: "markdown"}
