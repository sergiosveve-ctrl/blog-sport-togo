<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actu Sport Togo | Sergio</title>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f4f4; }
        header { background: #d32f2f; color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        #articles { display: grid; gap: 20px; }
        .article-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: left; }
        .article-card img { max-width: 100%; height: auto; border-radius: 5px; margin-top: 10px; }
        .article-card h2 { color: #d32f2f; margin-top: 0; }
        .article-date { font-size: 0.8em; color: #777; }
        .loading { font-style: italic; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>ACTU SPORT TOGO</h1>
        <p>Toutes les news sportives en direct par Joseph D.</p>
    </header>

    <div id="articles">
        <p class="loading">Chargement des dernières actualités...</p>
    </div>

    <script>
        // CONFIGURATION : Ton dépôt GitHub
        const repo = "sergiosveve-ctrl/blog-sport-togo";
        const folder = "blog";

        async function loadArticles() {
            const container = document.getElementById('articles');
            try {
                // 1. On récupère la liste des fichiers dans le dossier /blog
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`);
                const files = await response.json();

                if (files.length === 0) {
                    container.innerHTML = "<p>Aucun article pour le moment.</p>";
                    return;
                }

                container.innerHTML = ""; // On vide le message de chargement

                // 2. Pour chaque fichier trouvé, on récupère son contenu
                for (let file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const content = await res.text();
                        
                        // Séparation sommaire entre les infos du CMS (YAML) et le texte
                        const parts = content.split('---');
                        const body = parts.length > 2 ? parts[2] : content;
                        
                        // Création de la carte d'article
                        const card = document.createElement('div');
                        card.className = 'article-card';
                        card.innerHTML = marked.parse(body); // Transformation du Markdown en HTML
                        container.appendChild(card);
                    }
                }
            } catch (error) {
                console.error("Erreur lors du chargement :", error);
                container.innerHTML = "<p>Erreur lors du chargement des articles. Vérifiez votre connexion.</p>";
            }
        }

        // Lancement au chargement de la page
        loadArticles();

        // Gestion de la connexion Netlify
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
