<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Actu Sport Togo</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Script pour la connexion sécurisée -->
    </script>
</head>
<body>
    <header><h1>Actu Sport Togo</h1></header>
    
    <div id="articles-list">
        <!-- Tes articles s'afficheront ici tout seuls -->
        <p>Chargement des dernières news sportives...</p>
    </div>

    <script>
      // Petit script pour gérer la redirection après connexion admin
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
