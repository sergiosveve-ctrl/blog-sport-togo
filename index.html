<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootPulse | Actu Sport & Pronos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #d32f2f; --dark: #121212; --light: #ffffff; --gray: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--gray); color: var(--dark); }
        
        /* Header & Nav */
        header { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1504450758481-7338eba7524a?auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; color: var(--light); padding: 80px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%); }
        header h1 { font-family: 'Oswald', sans-serif; font-size: 4em; margin: 0; cursor: pointer; }
        
        /* Bannière Promo */
        .promo-banner { max-width: 1100px; margin: -30px auto 30px; background: linear-gradient(90deg, #1a237e, #0d47a1); color: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; z-index: 10; font-size: 0.9em; }
        .promo-code { font-family: 'Oswald', sans-serif; font-size: 1.5em; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 8px; }

        /* Grille & Articles */
        #content { max-width: 1100px; margin: 0 auto 100px; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .article-card { background: var(--light); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; text-decoration: none; color: inherit; }
        .article-card:hover { transform: translateY(-10px); }
        .img-container { height: 200px; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .article-content { padding: 20px; }
        .article-content h2 { font-family: 'Oswald', sans-serif; margin: 10px 0; font-size: 1.5em; }

        /* Vue Article Complet */
        .full-article { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: -50px; position: relative; }
        .full-article img { width: 100%; max-height: 500px; object-fit: cover; border-radius: 15px; margin-bottom: 30px; }
        .full-article h1 { font-family: 'Oswald', sans-serif; font-size: 3em; margin-bottom: 20px; }
        .full-article-body { line-height: 1.8; font-size: 1.1em; color: #333; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        @media (max-width: 600px) { .promo-banner { flex-direction: column; text-align: center; gap: 10px; margin: -20px 20px 30px; } .full-article { padding: 20px; } }
    </style>
</head>
<body>

    <header>
        <h1 onclick="window.location.href='index.html'">FOOTPULSE</h1>
        <p>L'actu foot et omnisports en direct</p>
    </header>

    <div id="content">
        <div class="promo-banner">
            <div>🎁 Bonus 200% sur 1XBET avec le code :</div>
            <div class="promo-code">YOUNO4</div>
        </div>
        <div id="main-view">
            <p style="text-align:center">Chargement du terrain...</p>
        </div>
    </div>

    <script>
        const repo = "sergiosveve-ctrl/blog-sport-togo";
        const folder = "blog";
        const mainView = document.getElementById('main-view');

        // Fonction pour charger la LISTE des articles
        async function loadList() {
            try {
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`);
                const files = await response.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md') && f.name !== '.gitkeep').reverse();
                
                let html = '<div class="grid">';
                for (let file of mdFiles) {
                    const res = await fetch(file.download_url);
                    const content = await res.text();
                    const meta = content.split('---')[1] || "";
                    const title = (meta.match(/title:\s*"(.*)"/) || meta.match(/title:\s*(.*)/) || ["","Sans titre"])[1];
                    const image = (meta.match(/image:\s*"(.*)"/) || meta.match(/image:\s*(.*)/) || ["","https://images.unsplash.com/photo-1461891263873-d81a64bb1030?auto=format&fit=crop&w=800&q=80"])[1];

                    html += `
                        <a href="?p=${file.name}" class="article-card">
                            <div class="img-container"><img src="${image}"></div>
                            <div class="article-content">
                                <h2>${title}</h2>
                                <p>Cliquez pour lire la suite...</p>
                            </div>
                        </a>`;
                }
                html += '</div>';
                mainView.innerHTML = html;
            } catch (e) { mainView.innerHTML = "Erreur de chargement."; }
        }

        // Fonction pour charger UN SEUL article complet
        async function loadSingle(fileName) {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${repo}/main/${folder}/${fileName}`);
                const content = await response.text();
                const parts = content.split('---');
                const meta = parts[1] || "";
                const body = parts[2] || parts[0];

                const title = (meta.match(/title:\s*"(.*)"/) || meta.match(/title:\s*(.*)/) || ["","Sans titre"])[1];
                const image = (meta.match(/image:\s*"(.*)"/) || meta.match(/image:\s*(.*)/) || ["",""])[1];

                mainView.innerHTML = `
                    <div class="full-article">
                        <div class="back-btn" onclick="window.location.href='index.html'">← Retour aux actus</div>
                        ${image ? `<img src="${image}">` : ''}
                        <h1>${title}</h1>
                        <div class="full-article-body">${marked.parse(body)}</div>
                    </div>`;
            } catch (e) { mainView.innerHTML = "Article introuvable."; }
        }

        // Système de routage simple
        const params = new URLSearchParams(window.location.search);
        const articleToRead = params.get('p');

        if (articleToRead) {
            loadSingle(articleToRead);
        } else {
            loadList();
        }
    </script>
</body>
</html>
