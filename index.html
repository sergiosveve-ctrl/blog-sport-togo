<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actu Sport Togo | Sergio</title> <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { --primary-red: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        
        /* Style du Header */
        header { background: var(--primary-red); color: white; padding: 60px 20px; text-align: center; }
        header h1 { margin: 0; font-size: 3em; text-transform: uppercase; letter-spacing: 2px; }
        header p { margin-top: 10px; font-size: 1.1em; opacity: 0.9; }

        /* Conteneur des articles */
        #articles { max-width: 850px; margin: -50px auto 50px; padding: 0 20px; }
        
        /* Style de la Carte d'article */
        .article-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .article-card img { width: 100%; height: 400px; object-fit: cover; display: block; }
        
        .article-content { padding: 30px; text-align: left; }
        .article-date { color: var(--primary-red); font-weight: bold; font-size: 0.9em; margin-bottom: 10px; }
        .article-card h2 { margin: 0 0 15px 0; font-size: 2em; color: #1a1a1a; }
        .article-body { line-height: 1.6; color: #444; font-size: 1.1em; }
        
        .loading { text-align: center; padding: 100px; font-style: italic; color: #888; }
    </style>
</head>
<body>

    <header>
        <h1>ACTU SPORT TOGO</h1> <p>Toutes les news sportives en direct par Joseph D.</p> </header>

    <div id="articles">
        <div class="loading">Chargement des dernières actus...</div>
    </div>

    <script>
        // Configuration issue de ton config.yml
        const repo = "sergiosveve-ctrl/blog-sport-togo";
        const folder = "blog";

        async function loadBlog() {
            const container = document.getElementById('articles');
            try {
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`);
                const files = await response.json();

                if (!Array.isArray(files) || files.length === 0) {
                    container.innerHTML = "<p>Aucun article publié.</p>";
                    return;
                }

                container.innerHTML = "";
                // On inverse pour avoir le plus récent en haut
                files.reverse();

                for (let file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const content = await res.text();
                        
                        // Découpage du contenu YAML / Markdown
                        const parts = content.split('---');
                        const meta = parts[1] || "";
                        const body = parts[2] || parts[0];

                        // Extraction des champs définis dans ton config.yml
                        const title = meta.match(/title:\s*"(.*)"/) || meta.match(/title:\s*(.*)/);
                        const date = meta.match(/date:\s*(.*)/);
                        const image = meta.match(/image:\s*"(.*)"/) || meta.match(/image:\s*(.*)/);

                        const dateFormatted = date ? new Date(date[1]).toLocaleDateString('fr-FR') : "";

                        const html = `
                            <article class="article-card">
                                ${image ? `<img src="${image[1]}" alt="${title ? title[1] : ''}">` : ''}
                                <div class="article-content">
                                    <div class="article-date">${dateFormatted}</div>
                                    <h2>${title ? title[1] : 'Sans titre'}</h2>
                                    <div class="article-body">${marked.parse(body)}</div>
                                </div>
                            </article>
                        `;
                        container.innerHTML += html;
                    }
                }
            } catch (err) {
                container.innerHTML = "<p>Erreur de chargement des articles.</p>";
            }
        }

        loadBlog();

        // Redirection Identity
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
